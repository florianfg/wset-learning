<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6f1d2a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="WSET Level 2" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="WSET Level 2" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="description" content="WSET Level 2 Lern-App mit Lernkarten, Quiz und lokal gespeichertem Fortschritt." />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
  <title>WSET Level 2 Lern-App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app-layout">

    <!-- Desktop Sidebar (versteckt auf Mobile) -->
    <aside id="sidebar" class="sidebar"></aside>

    <!-- Hauptspalte -->
    <div class="main-column">
      <header class="app-header">
        <svg class="header-icon" viewBox="0 0 24 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M5 2h14l-2 8a5 5 0 0 1-10 0L5 2z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linejoin="round"/>
          <line x1="12" y1="15" x2="12" y2="22" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="7" y1="25" x2="17" y2="25" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="header-title">WSET Level 2</span>
      </header>

      <!-- Mobile Nav-Strip (versteckt auf Desktop) -->
      <div id="nav-strip" class="nav-strip" onclick="openNavSheet()"></div>

      <!-- Hauptinhalt -->
      <div class="container">
        <div id="app"></div>
      </div>
    </div>

  </div>

  <!-- Bottom-Sheet Overlay (nur Mobile) -->
  <div id="sheet-backdrop" class="sheet-backdrop" onclick="closeNavSheet()"></div>
  <div id="bottom-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div id="bottom-sheet-content" class="sheet-content"></div>
  </div>

  <!-- 1. Struktur -->
  <script src="sections.js"></script>
  <script src="chapters.js"></script>

  <!-- 2. Content-Registry -->
  <script src="content-registry.js"></script>

  <!-- 3. Kapitel-Inhalte (36 Kapitel) -->
  <!-- 01 Grundlagen -->
  <script src="content/weinstruktur.js"></script>
  <script src="content/verkostungssystematik.js"></script>
  <script src="content/qualitaetsbeurteilung.js"></script>
  <!-- 02 Weinbau -->
  <script src="content/klima_und_standort.js"></script>
  <script src="content/lese.js"></script>
  <script src="content/weinberg_management.js"></script>
  <!-- 03 Weinherstellung -->
  <script src="content/weinbereitung_weisswein.js"></script>
  <script src="content/weinbereitung_rotwein.js"></script>
  <script src="content/weinbereitung_rose.js"></script>
  <script src="content/reifung_und_ausbau.js"></script>
  <!-- 04 Weiße Rebsorten -->
  <script src="content/chardonnay.js"></script>
  <script src="content/sauvignon_blanc.js"></script>
  <script src="content/riesling.js"></script>
  <script src="content/pinot_grigio_pinot_gris.js"></script>
  <script src="content/weitere_weissweine.js"></script>
  <!-- 05 Rote Rebsorten -->
  <script src="content/cabernet_sauvignon.js"></script>
  <script src="content/merlot.js"></script>
  <script src="content/pinot_noir.js"></script>
  <script src="content/syrah.js"></script>
  <script src="content/rotweine_mediterran.js"></script>
  <script src="content/rotweine_international.js"></script>
  <!-- 06 Schaumwein -->
  <script src="content/schaumwein_grundlagen.js"></script>
  <script src="content/herstellungsverfahren_schaumwein.js"></script>
  <!-- 07 Süßwein -->
  <script src="content/suesswein_grundlagen.js"></script>
  <script src="content/herstellungsverfahren_suesswein.js"></script>
  <!-- 08 Weinregionen -->
  <script src="content/frankreich.js"></script>
  <script src="content/da_at_hu.js"></script>
  <script src="content/spanien_portugal.js"></script>
  <script src="content/italien.js"></script>
  <script src="content/usa.js"></script>
  <script src="content/suedamerika.js"></script>
  <script src="content/australien_neuseeland.js"></script>
  <script src="content/suedafrika.js"></script>
  <!-- 09 Service & Pairing -->
  <script src="content/lagerung.js"></script>
  <script src="content/service.js"></script>
  <script src="content/food_pairing.js"></script>

  <!-- 4. App-Logik -->
  <script src="app.js"></script>
</body>
</html>
